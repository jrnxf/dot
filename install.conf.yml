- defaults:
    link:
      create: true
      relink: true
      force: true

- clean:
    ~/: {}
    ~/.config:
      recursive: true
    ~/.claude:
      recursive: true

- link:
    ~/.zshrc: shell/zsh/zshrc
    ~/.config/ghostty/config: config/ghostty
    ~/.config/cmux/cmux.json: config/cmux/cmux.json
    ~/.config/opencode/opencode.json: config/opencode/opencode.json
    ~/.gitconfig: git/gitconfig
    ~/.gitignore: git/gitignore
    ~/.tmux.conf: config/tmux/tmux.conf
    ~/.config/starship.toml: config/starship.toml
    ~/.config/karabiner/karabiner.json: config/karabiner.json
    ~/.claude/settings.json: config/claude/settings.json
    ~/.claude/CLAUDE.md: config/claude/CLAUDE.md
    ~/.claude/statusline-command.sh: config/claude/statusline-command.sh
    ~/.claude/hooks/cmux-notify.sh: config/claude/hooks/cmux-notify.sh
    ~/.claude/commands/ui-skills.md: config/claude/commands/ui-skills.md
    ~/.claude/agents/code-locator.md: config/claude/agents/code-locator.md
    ~/.claude/skills/timesheet/SKILL.md: config/claude/skills/timesheet/SKILL.md
    ~/.claude/skills/html-report/SKILL.md: config/claude/skills/html-report/SKILL.md
    ~/.claude/skills/alert/SKILL.md: config/claude/skills/alert/SKILL.md
    "~/Library/Application Support/Code/User/settings.json": config/vscode/settings.json
    "~/Library/Application Support/Code/User/keybindings.json": config/vscode/keybindings.json
- shell:
    - command: ./setup/mac.sh
      description: Setting up Mac
      stdout: true
      stderr: true
    - command: ./setup/zsh.sh
      description: Setting up zsh environment (oh-my-zsh, plugins, tpm, nvm)
      stdout: true
      stderr: true
    - command: ./setup/neovim.sh
      description: Setup Neovim
      stdout: true
      stderr: true
    - command: ./setup/claude.sh
      description: Setup Claude Code MCP servers
      stdout: true
      stderr: true
    - command: ./setup/vscode.sh
      description: Install VS Code extensions
      stdout: true
      stderr: true
